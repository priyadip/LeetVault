[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "leetvault"
version = "0.1.0"
description = "Mirror your LeetCode account (accepted submissions + source + metadata) into a normalized SQLite DB and a GitHub repo with an auto-generated README dashboard."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "leetvault" }]
keywords = ["leetcode", "cli", "sync", "github", "backup", "sqlite"]
classifiers = [
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Version Control :: Git",
]
dependencies = [
    "typer>=0.12",
    "rich>=13.7",
    "httpx>=0.27",
    "httpx-retries>=0.2",
    "sqlalchemy>=2.0",
    "jinja2>=3.1",
    "gitpython>=3.1",
    "keyring>=25.0",
    "pyjwt>=2.8",
]

[project.scripts]
leetvault = "leetvault.cli:app"

[project.urls]
Homepage = "https://github.com/priyadip/LeetVault"
Repository = "https://github.com/priyadip/LeetVault"
Issues = "https://github.com/priyadip/LeetVault/issues"
Changelog = "https://github.com/priyadip/LeetVault/blob/main/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-mock>=3.14",
    "ruff>=0.6",
    "mypy>=1.11",
    "respx>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["src/leetvault"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "N"]

[tool.mypy]
python_version = "3.11"
strict = true
packages = ["leetvault"]
mypy_path = "src"
explicit_package_bases = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=leetvault --cov-report=term-missing"

[tool.coverage.run]
source = ["src/leetvault"]
